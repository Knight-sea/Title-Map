<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>領土マップエディター</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Slot Screen -->
<div id="slot-screen" class="screen active">
  <div class="slot-container">
    <h1 class="slot-title">領土マップエディター</h1>
    <p class="slot-subtitle">セーブスロットを選択</p>
    <div id="slot-grid" class="slot-grid"></div>
    <div class="slot-actions">
      <label class="btn btn-secondary btn-import">JSONインポート<input type="file" id="import-file" accept=".json" hidden></label>
    </div>
  </div>
</div>

<!-- Size Screen -->
<div id="size-screen" class="screen">
  <div class="size-container">
    <h2>マップサイズ選択</h2>
    <div class="size-select-row">
      <label>幅 × 高さ</label>
      <select id="map-size-select"></select>
    </div>
    <div id="size-preview" class="size-preview"></div>
    <div class="size-actions">
      <button class="btn btn-secondary" id="size-back">戻る</button>
      <button class="btn btn-primary" id="size-confirm">作成</button>
    </div>
  </div>
</div>

<!-- Editor Screen -->
<div id="editor-screen" class="screen">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">領土マップ</span>
      <button class="btn-icon" id="btn-save" title="Ctrl+S">💾</button>
      <button class="btn-icon" id="btn-undo" title="Ctrl+Z">↩</button>
      <div class="topbar-divider"></div>

      <!-- Terrain brushes (hidden when locked) -->
      <div class="terrain-group" id="terrain-group">
        <div class="terrain-brushes">
          <button class="brush-btn" data-terrain="plain">平地</button>
          <button class="brush-btn" data-terrain="forest">森</button>
          <button class="brush-btn" data-terrain="river">川</button>
          <button class="brush-btn" data-terrain="mountain">山</button>
          <button class="brush-btn" data-terrain="sea">海</button>
        </div>
        <select id="brush-size" class="brush-size-select">
          <option value="1">1</option><option value="3">3</option><option value="5">5</option>
          <option value="7">7</option><option value="11">11</option><option value="15">15</option>
          <option value="21">21</option><option value="31">31</option><option value="51">51</option>
        </select>
        <div class="topbar-divider"></div>
      </div>

      <!-- Cell painting (hidden when locked) -->
      <div class="cell-group" id="cell-group">
        <button class="btn-tool" id="btn-cell-new" title="新しいセルを塗る">＋セル</button>
        <button class="btn-tool" id="btn-cell-paint" title="選択中セルを塗り足す" disabled>セル塗り</button>
        <div class="topbar-divider"></div>
      </div>

      <!-- Lock button -->
      <button class="btn-tool" id="btn-lock" title="地形とセルを固定">🔓 固定</button>
      <div class="topbar-divider"></div>

      <!-- View level (always visible) -->
      <label class="toolbar-label">階層</label>
      <select id="view-level" class="toolbar-select">
        <option value="0">帝国</option><option value="1">王国</option>
        <option value="2">公爵</option><option value="3">侯爵</option>
        <option value="4">伯爵</option><option value="5">子爵</option>
        <option value="6">男爵</option>
      </select>
    </div>
    <div class="topbar-right">
      <div class="bgm-wrapper">
        <button class="btn-icon" id="btn-bgm">♪</button>
        <div class="bgm-dropdown">
          <button id="bgm-play">▶ 再生</button>
          <button id="bgm-stop">■ 停止</button>
          <label>音量 <input type="range" id="bgm-volume" min="0" max="100" value="50"></label>
        </div>
      </div>
      <button class="btn-icon" id="btn-settings">⚙</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main-content">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="left-top">
        <div class="panel-tabs">
          <button class="tab-btn active" data-tab="territory">領地</button>
          <button class="tab-btn" data-tab="player">プレイヤー</button>
        </div>
        <div class="tree-view">
          <div id="territory-tab" class="tab-content active">
            <button class="btn btn-small btn-primary" id="btn-new-territory">＋ 新しい領地</button>
            <div id="territory-tree" class="tree"></div>
          </div>
          <div id="player-tab" class="tab-content">
            <button class="btn btn-small btn-primary" id="btn-new-player">＋ 新しいプレイヤー</button>
            <div id="player-list" class="player-list"></div>
          </div>
        </div>
      </div>
      <div class="panel-divider">
        <button class="divider-toggle" id="divider-toggle">▲ 編集パネル</button>
      </div>
      <div id="editor-panel" class="editor-panel collapsed">
        <div id="editor-content" class="editor-content">
          <p class="editor-placeholder">領地またはプレイヤーを選択</p>
        </div>
      </div>
    </div>

    <!-- Map -->
    <div id="canvas-container" class="canvas-container">
      <canvas id="map-canvas"></canvas>
      <div class="canvas-hud">
        <label class="toggle-label"><input type="checkbox" id="toggle-labels"> 名前</label>
        <span id="zoom-display" class="zoom-display">100%</span>
      </div>
    </div>
  </div>
</div>

<!-- Modals -->
<div id="settings-modal" class="modal" hidden>
  <div class="modal-content">
    <h3>設定</h3>
    <div class="form-group"><label>SoundCloud URL</label><input type="text" id="soundcloud-url" placeholder="https://soundcloud.com/..."></div>
    <div class="modal-actions"><button class="btn btn-secondary" id="settings-cancel">キャンセル</button><button class="btn btn-primary" id="settings-save">保存</button></div>
  </div>
</div>
<div id="save-modal" class="modal" hidden>
  <div class="modal-content">
    <h3>セーブ</h3>
    <div class="form-group"><label>スロット名</label><input type="text" id="save-slot-name"></div>
    <div class="modal-actions"><button class="btn btn-secondary" id="save-cancel">キャンセル</button><button class="btn btn-accent" id="save-export">JSON</button><button class="btn btn-primary" id="save-confirm">保存</button></div>
  </div>
</div>
<div id="color-picker-modal" class="modal" hidden>
  <div class="modal-content color-picker-content">
    <h3>色を選択</h3>
    <div class="cp-step">
      <div class="cp-label">色相</div>
      <div id="cp-hues" class="cp-hues"></div>
    </div>
    <div class="cp-step">
      <div class="cp-label">明暗</div>
      <div id="cp-shades" class="cp-shades"></div>
    </div>
    <div class="cp-preview-row">
      <div id="cp-preview" class="cp-preview"></div>
      <span id="cp-name" class="cp-name">-</span>
    </div>
    <div class="modal-actions"><button class="btn btn-secondary" id="color-cancel">キャンセル</button><button class="btn btn-primary" id="color-confirm">決定</button></div>
  </div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
